<style>
  :root {
    --bg: #000;
    --surface: rgba(28,28,30,0.88);
    --surface-solid: #1c1c1e;
    --text: #fff;
    --text-2: rgba(235,235,245,0.6);
    --accent: #0a84ff;
    --border: rgba(255,255,255,0.08);
    --tap: #0a84ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overscroll-behavior: none; }
  #map { position: fixed; inset: 0; background: #000; }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: calc(env(safe-area-inset-top) + 8px) 16px 10px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0) 100%);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    display: flex; align-items: center; justify-content: space-between;
    pointer-events: none;
  }
  .topbar h1 {
    margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
    pointer-events: auto;
  }
  .topbar .info {
    pointer-events: auto;
    width: 30px; height: 30px; border-radius: 15px;
    border: none; background: rgba(255,255,255,0.12);
    color: var(--text); font-size: 16px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .topbar .info:active { background: rgba(255,255,255,0.22); }

  /* Floating locate button */
  .locate {
    position: fixed; right: 14px;
    bottom: calc(env(safe-area-inset-bottom) + 22px);
    width: 48px; height: 48px; border-radius: 24px;
    background: var(--surface-solid);
    border: 1px solid var(--border);
    color: var(--accent);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    cursor: pointer;
  }
  .locate:active { background: #2c2c2e; }
  .locate svg { width: 22px; height: 22px; }

  /* Status pill */
  .status {
    position: fixed; left: 50%; transform: translateX(-50%);
    top: calc(env(safe-area-inset-top) + 56px);
    background: var(--surface); color: var(--text);
    padding: 8px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    z-index: 1100;
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    max-width: 86vw; text-align: center;
  }
  .status[hidden] { display: none; }

  /* Info sheet */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1200; display: none;
  }
  .sheet-backdrop.open { display: block; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface-solid);
    border-top-left-radius: 16px; border-top-right-radius: 16px;
    padding: 14px 18px calc(env(safe-area-inset-bottom) + 22px);
    z-index: 1201;
    transform: translateY(100%);
    transition: transform .28s ease;
  }
  .sheet.open { transform: translateY(0); }
  .sheet .handle {
    width: 36px; height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.25);
    margin: 0 auto 12px;
  }
  .sheet h2 { margin: 0 0 6px; font-size: 17px; font-weight: 600; }
  .sheet p { margin: 0 0 8px; font-size: 14px; line-height: 1.4; color: var(--text-2); }
  .sheet a { color: var(--accent); text-decoration: none; }
  .sheet .close {
    width: 100%; margin-top: 12px;
    padding: 12px; border: none; border-radius: 12px;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer;
  }

  /* Tap pin (Leaflet divIcon) */
  .tap-pin {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
  }
  .tap-pin svg { width: 30px; height: 30px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35)) drop-shadow(0 0 1px rgba(0,0,0,0.45)); }

  /* User location dot */
  .me-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent);
    border: 3px solid #fff;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.35),
      0 0 0 6px rgba(10,132,255,0.22),
      0 2px 8px rgba(0,0,0,0.45);
  }
  .me-pulse {
    position: relative;
    width: 22px; height: 22px;
  }
  .me-pulse::before {
    content: ""; position: absolute; inset: -10px;
    border-radius: 50%; background: rgba(10,132,255,0.28);
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.5); opacity: 0.9; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  /* Leaflet popup -> Apple look */
  .leaflet-popup-content-wrapper {
    background: var(--surface-solid) !important;
    color: var(--text) !important;
    border-radius: 14px !important;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
    padding: 4px !important;
  }
  .leaflet-popup-tip { background: var(--surface-solid) !important; }
  .leaflet-popup-content { margin: 12px 14px !important; font-family: inherit; min-width: 180px; }
  .leaflet-popup-close-button { color: var(--text-2) !important; padding: 6px 8px 0 0 !important; }

  .popup-title { font-size: 15px; font-weight: 600; line-height: 1.25; margin: 0 0 4px; }
  .popup-distance { font-size: 13px; color: var(--text-2); margin: 0 0 10px; }
  .popup-route {
    display: block; text-align: center;
    background: var(--accent); color: #fff;
    text-decoration: none;
    padding: 10px 14px; border-radius: 10px;
    font-size: 14px; font-weight: 600;
  }
  .popup-route:active { opacity: 0.85; }

  /* Attribution styling */
  .leaflet-control-attribution { font-size: 10px !important; background: rgba(255,255,255,0.78) !important; color: rgba(0,0,0,0.6) !important; }
  .leaflet-control-attribution a { color: rgba(0,0,0,0.75) !important; }
  .leaflet-control-zoom { display: none; }
</style>

<script>
(function() {
  'use strict';

  // ----- Helpers -----
  const $ = (s) => document.querySelector(s);
  const status = $('#status');
  function setStatus(msg) {
    if (!msg) { status.hidden = true; status.textContent = ''; return; }
    status.textContent = msg; status.hidden = false;
  }

  // Haversine distance in meters
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLng/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }
  function formatDistance(m) {
    if (m < 950) return Math.round(m) + ' m';
    return (m/1000).toFixed(m < 9500 ? 1 : 0) + ' km';
  }

  // Default fallback view: centre of Dunea region (Den Haag)
  const FALLBACK = { lat: 52.0780, lng: 4.3007, zoom: 12 };

  // ----- Map -----
  const map = L.map('map', {
    zoomControl: false,
    attributionControl: true,
    tap: true,
    preferCanvas: false
  }).setView([FALLBACK.lat, FALLBACK.lng], FALLBACK.zoom);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    subdomains: 'abcd',
    attribution: '&copy; <a href="https://openstreetmap.org">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);

  // ----- Tap markers -----
  const dropletSVG =
    '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
      '<defs><radialGradient id="g" cx="50%" cy="40%" r="60%">' +
        '<stop offset="0%" stop-color="#3aa9ff"/>' +
        '<stop offset="100%" stop-color="#0050b3"/>' +
      '</radialGradient></defs>' +
      '<path d="M12 2 C12 2 4 11 4 16 a8 8 0 0 0 16 0 C20 11 12 2 12 2 z" ' +
        'fill="url(#g)" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>' +
      '<ellipse cx="9.5" cy="13" rx="2" ry="3" fill="rgba(255,255,255,0.55)"/>' +
    '</svg>';

  const tapIcon = L.divIcon({
    className: 'tap-pin',
    html: dropletSVG,
    iconSize: [30, 30],
    iconAnchor: [15, 28],
    popupAnchor: [0, -26]
  });

  const tapLayer = L.layerGroup().addTo(map);
  const markersById = new Map();

  TAPS.forEach((t) => {
    const m = L.marker([t.lat, t.lng], { icon: tapIcon, alt: t.n });
    m.tapData = t;
    m.on('click', () => openPopupFor(m));
    m.addTo(tapLayer);
    markersById.set(t.id, m);
  });

  function googleMapsUrl(lat, lng) {
    return 'https://www.google.com/maps/dir/?api=1&destination=' +
           encodeURIComponent(lat + ',' + lng) + '&travelmode=walking';
  }

  function openPopupFor(marker) {
    const t = marker.tapData;
    let dist = '';
    if (userLatLng) {
      const d = haversine(userLatLng.lat, userLatLng.lng, t.lat, t.lng);
      dist = formatDistance(d) + ' hier vandaan';
    }
    const html =
      '<div>' +
        '<p class="popup-title">' + escapeHtml(t.n) + '</p>' +
        (dist ? '<p class="popup-distance">' + dist + '</p>' : '') +
        '<a class="popup-route" href="' + googleMapsUrl(t.lat, t.lng) +
          '" target="_blank" rel="noopener">Route &rsaquo;</a>' +
      '</div>';
    marker.bindPopup(html, { closeButton: true, autoPan: true }).openPopup();
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // ----- User location -----
  let userLatLng = null;
  let userMarker = null;
  let firstFix = true;

  const meIcon = L.divIcon({
    className: '',
    html: '<div class="me-pulse"><div class="me-dot"></div></div>',
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });

  function updateUser(lat, lng) {
    userLatLng = { lat, lng };
    if (!userMarker) {
      userMarker = L.marker([lat, lng], { icon: meIcon, interactive: false, keyboard: false, zIndexOffset: 1000 }).addTo(map);
    } else {
      userMarker.setLatLng([lat, lng]);
    }
    if (firstFix) {
      firstFix = false;
      fitToUserAndNearest();
      setStatus(null);
    }
  }

  function fitToUserAndNearest() {
    if (!userLatLng) return;
    // sort taps by distance
    const sorted = TAPS.map((t) => ({
      t, d: haversine(userLatLng.lat, userLatLng.lng, t.lat, t.lng)
    })).sort((a,b) => a.d - b.d);
    const nearest = sorted.slice(0, 2);
    const pts = [
      [userLatLng.lat, userLatLng.lng],
      [nearest[0].t.lat, nearest[0].t.lng],
      [nearest[1].t.lat, nearest[1].t.lng]
    ];
    map.fitBounds(pts, { padding: [60, 60], maxZoom: 16 });
  }

  function locate(showMsg) {
    if (!navigator.geolocation) {
      setStatus('Geolocatie niet beschikbaar');
      return;
    }
    if (showMsg) setStatus('Locatie zoeken…');
    navigator.geolocation.getCurrentPosition(
      (pos) => updateUser(pos.coords.latitude, pos.coords.longitude),
      (err) => {
        setStatus('Locatie niet beschikbaar — sta toegang toe in de instellingen');
        setTimeout(() => setStatus(null), 4000);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
    );
    // also watch for updates
    try {
      navigator.geolocation.watchPosition(
        (pos) => updateUser(pos.coords.latitude, pos.coords.longitude),
        () => {},
        { enableHighAccuracy: true, maximumAge: 15000, timeout: 20000 }
      );
    } catch(e) {}
  }

  // initial locate
  setStatus('Locatie zoeken…');
  locate(false);

  // Locate button
  $('#locateBtn').addEventListener('click', () => {
    if (userLatLng) {
      firstFix = true;
      fitToUserAndNearest();
    } else {
      locate(true);
    }
  });

  // Info sheet
  const sheet = $('#sheet');
  const backdrop = $('#sheetBackdrop');
  function openSheet() { sheet.classList.add('open'); backdrop.classList.add('open'); }
  function closeSheet() { sheet.classList.remove('open'); backdrop.classList.remove('open'); }
  $('#infoBtn').addEventListener('click', openSheet);
  $('#sheetClose').addEventListener('click', closeSheet);
  backdrop.addEventListener('click', closeSheet);

  // ----- Service worker -----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
})();
</script>
